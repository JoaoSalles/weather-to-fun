# Supply-chain guardrail: refuse to install package versions published less
# than 2 weeks ago (14 * 24 * 60 = 20160 minutes), giving the community time to
# detect and pull compromised releases.
minimumReleaseAge: 20160

# Packages allowed to bypass the cooldown (e.g. for a critical hotfix).
# Use "name" or "name@version". Leave empty to enforce the guardrail everywhere.
minimumReleaseAgeExclude: [ '@nx/devkit@23.0.1', '@nx/eslint-plugin@23.0.1', '@nx/eslint@23.0.1', '@nx/js@23.0.1', '@nx/module-federation@23.0.1', '@nx/nx-darwin-arm64@23.0.1', '@nx/nx-darwin-x64@23.0.1', '@nx/nx-freebsd-x64@23.0.1', '@nx/nx-linux-arm-gnueabihf@23.0.1', '@nx/nx-linux-arm64-gnu@23.0.1', '@nx/nx-linux-arm64-musl@23.0.1', '@nx/nx-linux-x64-gnu@23.0.1', '@nx/nx-linux-x64-musl@23.0.1', '@nx/nx-win32-arm64-msvc@23.0.1', '@nx/nx-win32-x64-msvc@23.0.1', '@nx/playwright@23.0.1', '@nx/react@23.0.1', '@nx/rollup@23.0.1', '@nx/vite@23.0.1', '@nx/vitest@23.0.1', '@nx/web@23.0.1', '@nx/workspace@23.0.1', nx@23.0.1 ]

allowBuilds:
  '@swc/core': true
  esbuild: true
  nx: true
